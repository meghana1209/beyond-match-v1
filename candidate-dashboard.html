<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – BeyondMatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
:root {
  --bg:          #0b0e16;
  --card:        #131726;
  --card-border: rgba(122,162,255,0.08);
  --blue:        #7aa2ff;
  --blue-dim:    rgba(122,162,255,0.10);
  --green:       #4ade80;
  --red:         #f87171;
  --text-1:      #e2e8f0;
  --text-3:      #88add9;
  --sidebar-w:   220px;
  --radius-lg:   14px;
  --radius-sm:   8px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

::-webkit-scrollbar              { width: 5px; }
::-webkit-scrollbar-track        { background: var(--bg); }
::-webkit-scrollbar-thumb        { background: #1e2540; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover  { background: var(--blue); }

body {
  display: flex;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text-1);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.cand-sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: #0d1018;
  border-right: 1px solid rgba(255,255,255,0.05);
  padding: 28px 16px 24px;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.cand-brand {
  font-size: 1.45rem;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 36px;
  letter-spacing: -0.02em;
}

.cand-menu {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.cand-menu-item {
  display: block;
  font-size: 13.5px;
  font-weight: 500;
  color: #a8b3d1;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  text-decoration: none;
  border: 1px solid transparent;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}

.cand-menu-item:hover {
  background: rgba(122,162,255,0.06);
  color: var(--text-1);
}

.cand-menu-item.active {
  background: rgba(122,162,255,0.1);
  border-color: rgba(122,162,255,0.25);
  color: var(--blue);
}

.logout-btn {
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--red);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s;
  margin-top: 4px;
}

.logout-btn:hover { background: rgba(248,113,113,0.08); }

/* ── MAIN ── */
.cand-main {
  flex: 1;
  min-width: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 32px 32px 48px;
  display: flex;
  flex-direction: column;
}

/* ── PAGE TITLE ── */
.cand-page-title { margin-bottom: 24px; }
.cand-page-title h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.cand-page-title p { font-size: 13px; color: var(--text-3); margin-top: 5px; }

/* ── POWER BI CARD ── */
.powerbi-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 0;
}

.powerbi-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: #9bb3ff;
}

.powerbi-card iframe {
  flex: 1;
  width: 100%;
  min-height: 0;
  border: none;
  border-radius: 10px;
  background: #0d1018;
}
</style>
</head>

<body>

<aside class="cand-sidebar">
 <a href="/candidate-dashboard.html" style="text-decoration:none;"><h2 class="cand-brand">BeyondMatch</h2></a>
  <nav class="cand-menu">
    <a href="candidate-dashboard.html" class="cand-menu-item active">Dashboard</a>
    <a href="resume.html"              class="cand-menu-item">Resume Analysis</a>
    <a href="jobmatches.html"          class="cand-menu-item">Job Matches</a>
    <a href="savedjobs.html"           class="cand-menu-item">Saved Jobs</a>
    <a href="locatehire.html"          class="cand-menu-item">LocateHire</a>
    <a href="settings.html"            class="cand-menu-item">Settings</a>
  </nav>
  <button class="logout-btn" onclick="unifiedLogout()">⏻ Logout</button>
</aside>

<main class="cand-main">

  <div class="cand-page-title">
    <h1>Job Market Overview</h1>
    <p>Data-driven insights into job availability, match scores, and hiring trends.</p>
  </div>

  <div class="powerbi-card">
    <div class="powerbi-label">Candidate Insights Dashboard</div>
    <iframe
      src="https://app.powerbi.com/view?r=eyJrIjoiYjlkZDZmYzAtMmNlZC00ZjdkLWIzNDctMTlhNTRmOWYzNDk5IiwidCI6IjljMTg1NzE0LWYwYWYtNDgyNi1iZDRiLTdiOTg3ZjZkZDkyMSJ9"
      allowfullscreen>
    </iframe>
  </div>

</main>

<script type="module" src="auth.js"></script>
<script type="module" src="api.js"></script>

</body>
</html>
