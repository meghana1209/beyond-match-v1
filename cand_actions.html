<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Applications – BeyondMatch</title>
  <link rel="stylesheet" href="recruiter-matches.css" />
  <link rel="stylesheet" href="skeleton-loader.css" />

<style>
/* ── page ── */
.page-title { margin-bottom: 20px; }
.page-title h1 { font-size: 22px; font-weight: 700; color: #e2e8f0; margin: 0 0 4px; }
.page-title p  { font-size: 13px; color: #6b7fa8; margin: 0; }

/* ── top bar ── */
.ca-topbar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
}

/* ── pipeline tabs ── */
.pipeline-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.ptab {
  font-family: inherit; font-size: 12px; font-weight: 600;
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid rgba(122,162,255,.12);
  background: transparent; color: #6b7fa8;
  cursor: pointer; transition: all .18s; display: flex; align-items: center; gap: 6px;
}
.ptab.active { background: rgba(122,162,255,.12); border-color: rgba(122,162,255,.3); color: #7aa2ff; }
.ptab:hover:not(.active) { color: #a0aec0; border-color: rgba(122,162,255,.2); }
.ptab-count {
  background: rgba(122,162,255,.18); border-radius: 10px;
  padding: 1px 6px; font-size: 10px; font-weight: 700;
}

/* ── notif ── */
.notif-btn {
  position: relative; background: rgba(122,162,255,.07);
  border: 1px solid rgba(122,162,255,.15);
  border-radius: 10px; padding: 7px 14px;
  color: #7aa2ff; cursor: pointer; font-size: 13px; font-weight: 600;
  transition: all .18s; display: flex; align-items: center; gap: 6px;
  font-family: inherit;
}
.notif-btn:hover { background: rgba(122,162,255,.14); }
.notif-badge {
  position: absolute; top: -5px; right: -5px;
  background: #f87171; color: #fff;
  font-size: 10px; font-weight: 700;
  width: 17px; height: 17px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #080c18;
}

/* ── app grid ── */
.app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}

/* ── app card ── */
.app-card {
  background: #0c1121;
  border: 1px solid rgba(122,162,255,.10);
  border-radius: 14px; padding: 20px 22px;
  display: flex; flex-direction: column; gap: 12px;
  transition: border-color .18s, box-shadow .18s;
  position: relative;
}
.app-card:hover { border-color: rgba(122,162,255,.22); box-shadow: 0 4px 24px rgba(0,0,0,.25); }
.app-card.new-update::before {
  content: 'NEW';
  position: absolute; top: -8px; right: 16px;
  background: #7aa2ff; color: #080c18;
  font-size: 9px; font-weight: 800; letter-spacing: .5px;
  padding: 2px 7px; border-radius: 10px;
}

/* ── status chip ── */
.app-status-chip {
  font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
  padding: 4px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
}
.chip-applied     { background: rgba(122,162,255,.12); color: #7aa2ff; border: 1px solid rgba(122,162,255,.25); }
.chip-reviewing   { background: rgba(251,191,36,.10);  color: #fbbf24; border: 1px solid rgba(251,191,36,.25); }
.chip-shortlisted { background: rgba(192,132,252,.12); color: #c084fc; border: 1px solid rgba(192,132,252,.25); }
.chip-interview   { background: rgba(56,189,248,.10);  color: #38bdf8; border: 1px solid rgba(56,189,248,.25); }
.chip-hired       { background: rgba(74,222,128,.10);  color: #4ade80; border: 1px solid rgba(74,222,128,.25); }
.chip-rejected    { background: rgba(248,113,113,.10); color: #f87171; border: 1px solid rgba(248,113,113,.25); }

/* ── progress bar ── */
.pipeline-progress {
  display: flex; gap: 3px; align-items: center; margin: 4px 0;
}
.pp-step {
  height: 3px; flex: 1; border-radius: 2px;
  background: rgba(122,162,255,.1); transition: background .3s;
}
.pp-step.done { background: #7aa2ff; }
.pp-step.current { background: #c084fc; }

/* ── message section ── */
.rec-note {
  background: rgba(122,162,255,.04);
  border: 1px solid rgba(122,162,255,.12);
  border-radius: 10px; padding: 12px 14px;
  font-size: 12.5px; color: #a0aec0; line-height: 1.55;
}
.rec-note .note-label {
  font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
  color: #4a5580; margin-bottom: 5px;
}

/* ── action buttons ── */
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.ca-btn {
  font-family: inherit; font-size: 11.5px; font-weight: 600;
  padding: 7px 14px; border-radius: 8px; cursor: pointer;
  border: 1px solid rgba(122,162,255,.18);
  background: transparent; color: #7aa2ff;
  transition: all .18s; display: flex; align-items: center; gap: 5px;
}
.ca-btn:hover { background: rgba(122,162,255,.10); border-color: rgba(122,162,255,.35); }
.ca-btn.green { color: #4ade80; border-color: rgba(74,222,128,.18); }
.ca-btn.green:hover { background: rgba(74,222,128,.08); border-color: rgba(74,222,128,.35); }

/* ── empty ── */
.empty-state {
  grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #4a5580;
}
.empty-state h3 { font-size: 15px; color: #6b7fa8; margin: 0 0 6px; }
.empty-state p  { font-size: 13px; margin: 0 0 16px; }
.empty-cta {
  display: inline-block; font-family: inherit; font-size: 13px; font-weight: 600;
  padding: 10px 20px; border-radius: 10px; cursor: pointer;
  background: rgba(122,162,255,.12); border: 1px solid rgba(122,162,255,.3);
  color: #7aa2ff; text-decoration: none; transition: all .18s;
}
.empty-cta:hover { background: rgba(122,162,255,.2); }

/* ── notif panel ── */
.notif-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: 340px;
  background: #0a0e1a; border-left: 1px solid rgba(122,162,255,.12);
  z-index: 500; transform: translateX(100%);
  transition: transform .28s cubic-bezier(.22,1,.36,1);
  display: flex; flex-direction: column;
  box-shadow: -8px 0 40px rgba(0,0,0,.5);
}
.notif-panel.open { transform: translateX(0); }
.notif-panel-head {
  padding: 20px 20px 14px;
  border-bottom: 1px solid rgba(122,162,255,.08);
  display: flex; align-items: center; justify-content: space-between;
}
.notif-panel-head h3 { font-size: 15px; color: #e2e8f0; margin: 0; font-weight: 700; }
.notif-panel-close { background: none; border: none; color: #4a5580; font-size: 20px; cursor: pointer; transition: color .15s; }
.notif-panel-close:hover { color: #e2e8f0; }
.notif-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.notif-item {
  background: #0c1121; border: 1px solid rgba(122,162,255,.08);
  border-radius: 10px; padding: 12px 14px;
  font-size: 12.5px; color: #a0aec0; line-height: 1.5; cursor: pointer; transition: border-color .15s;
}
.notif-item:hover { border-color: rgba(122,162,255,.2); }
.notif-item.unread { border-color: rgba(122,162,255,.2); background: rgba(122,162,255,.04); }
.notif-item .notif-status { font-weight: 700; }
.notif-item .notif-time { font-size: 11px; color: #4a5580; margin-top: 4px; }
.notif-empty { padding: 40px 20px; text-align: center; color: #4a5580; font-size: 13px; }
.mark-read-btn {
  font-family: inherit; font-size: 11px; font-weight: 600;
  background: none; border: none; color: #7aa2ff; cursor: pointer;
  padding: 0; opacity: .7; transition: opacity .15s;
}
.mark-read-btn:hover { opacity: 1; }

/* ── app card inner layout — mirrors rec-actions exactly ── */
.app-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.app-cand-name { font-size: 15px; font-weight: 700; color: #e2e8f0; margin: 0 0 3px; }
.app-cand-role { font-size: 12px; color: #6b7fa8; }
.app-meta { display: flex; gap: 12px; font-size: 11px; color: #4a5580; flex-wrap: wrap; }
.app-note-preview {
  font-size: 12px; color: #6b7fa8; font-style: italic;
  background: rgba(122,162,255,.04); border-left: 2px solid rgba(122,162,255,.2);
  padding: 6px 10px; border-radius: 0 6px 6px 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
}
.app-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.app-btn {
  font-family: inherit; font-size: 11.5px; font-weight: 600;
  padding: 6px 13px; border-radius: 8px; cursor: pointer;
  border: 1px solid rgba(122,162,255,.18);
  background: transparent; color: #7aa2ff;
  transition: all .18s; display: flex; align-items: center; gap: 5px;
}
.app-btn:hover { background: rgba(122,162,255,.10); border-color: rgba(122,162,255,.35); }
.app-btn.success { color: #4ade80; border-color: rgba(74,222,128,.18); }
.app-btn.success:hover { background: rgba(74,222,128,.08); border-color: rgba(74,222,128,.35); }

/* ── profile modal fields — mirrors rec-actions ── */
.prof-row { display: flex; gap: 12px; flex-direction: column; margin-bottom: 16px; }
.prof-field label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #4a5580; margin-bottom: 4px; display: block; }
.prof-field p { font-size: 13.5px; color: #c9d5e8; margin: 0; line-height: 1.5; }

/* ── modal buttons — mirrors rec-actions ── */
.bm-btn-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
.bm-btn {
  font-family: inherit; font-size: 13px; font-weight: 600;
  padding: 9px 20px; border-radius: 9px; cursor: pointer;
  border: 1px solid rgba(122,162,255,.2);
  background: transparent; color: #7aa2ff; transition: all .18s;
}
.bm-btn:hover { background: rgba(122,162,255,.1); }
.bm-btn.primary {
  background: rgba(122,162,255,.14); border-color: rgba(122,162,255,.4); color: #7aa2ff;
}
.bm-btn.primary:hover { background: rgba(122,162,255,.22); }

/* ── timeline note line ── */
.tl-note { font-size: 12px; color: #6b7fa8; margin-top: 4px; font-style: italic; }

/* ── detail modal ── */
.bm-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.78);
  backdrop-filter: blur(6px); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; box-sizing: border-box;
}
.bm-modal {
  background: #0f1220; border: 1px solid rgba(122,162,255,.15);
  border-radius: 16px; width: 100%; max-width: 540px;
  max-height: 88vh; overflow-y: auto; padding: 28px;
  box-sizing: border-box; position: relative; color: #e2e8f0;
}
.bm-modal-title { font-size: 11px; color: #7aa2ff; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.bm-modal h2 { font-size: 19px; color: #e2e8f0; margin: 0 0 4px; }
.bm-modal-close { position: absolute; top: 16px; right: 18px; background: none; border: none; color: #4a5580; font-size: 20px; cursor: pointer; line-height: 1; transition: color .15s; }
.bm-modal-close:hover { color: #e2e8f0; }

/* timeline */
.timeline { display: flex; flex-direction: column; }
.tl-item { display: flex; gap: 14px; align-items: flex-start; padding-bottom: 16px; position: relative; }
.tl-item:not(:last-child)::before { content: ''; position: absolute; left: 10px; top: 22px; width: 1px; height: calc(100% - 6px); background: rgba(122,162,255,.12); }
.tl-dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; margin-top: 2px; border: 2px solid currentColor; }
.tl-body { flex: 1; }
.tl-label { font-size: 12px; font-weight: 600; color: #c9d5e8; }
.tl-time  { font-size: 11px; color: #4a5580; margin-top: 2px; }

/* skeletons */
.skeleton-candidate-card { background: #0c1121; border: 1px solid rgba(122,162,255,.08); border-radius: 14px; padding: 18px 20px; }
.skeleton-title   { background: rgba(122,162,255,.07); border-radius: 6px; height: 14px; }
.skeleton-subtitle{ background: rgba(122,162,255,.05); border-radius: 6px; height: 11px; }
.skeleton-chip    { background: rgba(122,162,255,.06); border-radius: 20px; width: 60px; height: 18px; }
.skeleton-btn     { background: rgba(122,162,255,.06); border-radius: 8px; height: 30px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
.skeleton-candidate-card * { animation: pulse 1.6s ease infinite; }
</style>

<script type="module">
import { analytics, auth, db } from "./auth.js";
import {
  collection, getDocs, query, where, doc, getDoc,
  updateDoc, onSnapshot, orderBy, limit, addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* ─── state ─── */
let allApps      = [];
let activeStatus = 'all';
let candidateId  = null;   // candidate string ID (e.g. 50475d87-...)
let currentUserUid = null; // Firebase UID — used for notification queries

const STATUSES = ['applied','reviewing','shortlisted','interview','hired','rejected'];
const STATUS_LABELS = {
  applied:'Applied', reviewing:'Reviewing', shortlisted:'Shortlisted',
  interview:'Interview', hired:'Hired', rejected:'Rejected'
};
// pipeline steps for progress bar
const PIPELINE_STEPS = ['applied','reviewing','shortlisted','interview','hired'];

/* ─── init ─── */
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  // get candidate_id
  const userSnap = await getDoc(doc(db, 'users', user.uid)).catch(() => null);
  if (!userSnap?.exists()) return;
  candidateId = userSnap.data().candidate_id || userSnap.data().latest_candidate_id;
  if (!candidateId) return;

  // Store Firebase UID at module scope for markAllRead etc.
  currentUserUid = user.uid;
  // Pass the Firebase UID so queries use candidate_user_id (no get() in rules needed)
  loadApplications(user.uid);
  subscribeNotifications(user.uid);
});

/* ─── load applications ─── */
function loadApplications(userUid) {
  // Query by candidate_user_id (Firebase UID) — avoids get() in Firestore rules
  // and requires a composite index: candidate_user_id ASC + applied_at DESC
  const q = query(
    collection(db, 'applications'),
    where('candidate_user_id', '==', userUid),
    orderBy('applied_at', 'desc')
  );

  onSnapshot(q, async (snap) => {
    const apps = [];
    const jobCache = {};

    for (const docSnap of snap.docs) {
      const d = docSnap.data();
      // Use job_firestore_id if present (the actual Firestore doc ID),
      // otherwise fall back to job_id. If direct lookup misses, query
      // posted_jobs by the job_id field since the Firestore doc ID may
      // be an auto-generated ID that differs from the backend job_id.
      const fsDocId = d.job_firestore_id || d.job_id;
      if (!jobCache[fsDocId]) {
        try {
          let jSnap = await getDoc(doc(db, 'posted_jobs', fsDocId));
          if (jSnap.exists()) {
            jobCache[fsDocId] = jSnap.data();
          } else {
            // Direct lookup missed — query by the job_id field
            const fieldQ = query(
              collection(db, 'posted_jobs'),
              where('job_id', '==', d.job_id)
            );
            const fieldSnap = await getDocs(fieldQ);
            jobCache[fsDocId] = fieldSnap.empty ? null : fieldSnap.docs[0].data();
          }
        } catch { jobCache[fsDocId] = null; }
      }
      const jd = jobCache[fsDocId];
      apps.push({
        id: docSnap.id,
        ...d,
        jobData: jd,
        jobTitle: jd?.title || d.job_title || 'Job',
        company:  jd?.organisation_name
                  || jd?.company
                  || jd?.company_name
                  || d.company_name
                  || d.company
                  || '',
        location: jd?.location || d.location || '',
      });
    }

    allApps = apps;
    updateCounts();
    renderCards();
  });
}

/* ─── counts ─── */
function updateCounts() {
  document.getElementById('cnt-all').textContent = allApps.length;
  STATUSES.forEach(s => {
    const el = document.getElementById(`cnt-${s}`);
    if (el) el.textContent = allApps.filter(a => a.status === s).length;
  });
}

/* ─── render ─── */
function renderCards() {
  const container = document.getElementById('appContainer');
  let apps = allApps;
  if (activeStatus !== 'all') apps = apps.filter(a => a.status === activeStatus);

  if (!apps.length) {
    container.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="margin-bottom:16px;opacity:.4"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        <h3>${activeStatus === 'all' ? "You haven't applied to any jobs yet" : `No applications in "${STATUS_LABELS[activeStatus]}"`}</h3>
        <p>Browse matched jobs and click Apply to get started.</p>
        <a href="jobmatches.html" class="empty-cta">Browse Job Matches →</a>
      </div>`;
    return;
  }

  container.innerHTML = apps.map(app => buildCard(app)).join('');
}

function buildCard(app) {
  const status    = app.status || 'applied';
  const chipClass = `chip-${status}`;
  const timeAgo   = app.applied_at?.toDate ? timeSince(app.applied_at.toDate()) : 'Recently';
  const isNew     = app.cand_unread;
  const rejected  = status === 'rejected';
  const progressHTML = !rejected ? buildProgress(status) : '';
  const notePreview  = app.note
    ? `<div class="app-note-preview">💬 ${escHtml(app.note)}</div>`
    : '';

  return `
    <div class="app-card ${isNew ? 'unread' : ''}"
         data-id="${app.id}"
         onclick="openDetail('${app.id}')"
         style="cursor:pointer;">

      <div class="app-card-top">
        <div>
          <div class="app-cand-name">${escHtml(app.jobTitle)}</div>
          <div class="app-cand-role">${app.company ? escHtml(app.company) : ''}${app.company && app.location ? ' · ' : ''}${app.location ? escHtml(app.location) : ''}</div>
        </div>
        <span class="app-status-chip ${chipClass}">${STATUS_LABELS[status]}</span>
      </div>

      ${progressHTML}

      <div class="app-meta">
        <span>📅 Applied ${timeAgo}</span>
        ${app.company ? `<span>🏢 ${escHtml(app.company)}</span>` : ''}
      </div>

      ${notePreview}

      ${status === 'interview' ? `
      <div style="background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.2);border-radius:8px;padding:9px 12px;font-size:12px;color:#38bdf8;">
        🎉 You've been selected for an interview!
      </div>` : ''}

      ${status === 'hired' ? `
      <div style="background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:9px 12px;font-size:12px;color:#4ade80;font-weight:600;">
        🎊 Congratulations! You've been hired.
      </div>` : ''}

      ${rejected ? `
      <div style="background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);border-radius:8px;padding:9px 12px;font-size:12px;color:#f87171;">
        This application was not successful. Keep applying!
      </div>` : ''}

      <div class="app-actions" onclick="event.stopPropagation()">
        <button class="app-btn" onclick="openDetail('${app.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          View Details
        </button>
        ${app.recruiter_email || app.company_email ? `
        <button class="app-btn success"
          onclick="window.location.href='mailto:${escAttr(app.recruiter_email || app.company_email)}?subject=Re: My application for ${escAttr(app.jobTitle)}'">
          ✉ Reach Out
        </button>` : ''}
      </div>
    </div>`;
}

function buildProgress(currentStatus) {
  const steps = PIPELINE_STEPS;
  const ci = steps.indexOf(currentStatus);
  const dots = steps.map((s, i) => {
    let cls = 'pp-step';
    if (i < ci)  cls += ' done';
    if (i === ci) cls += ' current';
    return `<div class="${cls}" title="${STATUS_LABELS[s]}"></div>`;
  }).join('');
  return `<div class="pipeline-progress">${dots}</div>`;
}

/* ─── detail modal — matches rec-actions profile modal exactly ─── */

/* ─── notifications (status updates from recruiters) ─── */
function subscribeNotifications(userUid) {
  // to_user_id stores the Firebase UID of the recipient — query directly
  // Composite index needed: to_user_id ASC + to_role ASC + created_at DESC
  const q = query(
    collection(db, 'notifications'),
    where('to_user_id', '==', userUid),
    where('to_role', '==', 'candidate'),
    orderBy('created_at', 'desc'),
    limit(30)
  );

  onSnapshot(q, (snap) => {
    const notifs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const unread  = notifs.filter(n => !n.read).length;

    const badge = document.getElementById('notifBadge');
    badge.textContent = unread;
    badge.style.display = unread ? 'flex' : 'none';

    const list = document.getElementById('notifList');
    if (!notifs.length) {
      list.innerHTML = '<div class="notif-empty">No updates from recruiters yet.</div>';
      return;
    }
    list.innerHTML = notifs.map(n => {
      const time = n.created_at?.toDate ? timeSince(n.created_at.toDate()) : 'Recently';
      if (n.type === 'invite_to_apply') {
        return `
          <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markNotifRead('${n.id}')">
            <div>
              <strong>${escHtml(n.recruiter_name || 'A recruiter')}</strong> invited you to apply for
              <strong>${escHtml(n.job_title || 'a job')}</strong>.
              ${n.message && n.message !== `${n.recruiter_name || 'A recruiter'} invited you to apply for "${n.job_title}".`
                ? `<div style="margin-top:5px;font-size:12px;color:#6b7fa8;font-style:italic;">"${escHtml(n.message)}"</div>` : ''}
            </div>
            ${n.apply_url ? `
            <a href="${escAttr(n.apply_url)}"
               onclick="event.stopPropagation();markNotifRead('${n.id}')"
               style="display:inline-flex;align-items:center;gap:5px;margin-top:8px;
                      font-size:12px;font-weight:600;color:#4ade80;text-decoration:none;
                      background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);
                      padding:5px 11px;border-radius:7px;transition:background .15s;"
               onmouseover="this.style.background='rgba(74,222,128,.16)'"
               onmouseout="this.style.background='rgba(74,222,128,.08)'">
              🚀 Apply Now
            </a>` : ''}
            <div class="notif-time">${time}</div>
          </div>`;
      }
      return `
        <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markNotifRead('${n.id}')">
          <div>
            Your application for <strong>${escHtml(n.job_title || 'a job')}</strong> was updated to
            <span class="notif-status" style="color:${statusColor(n.new_status)}">${STATUS_LABELS[n.new_status] || n.new_status || ''}</span>.
          </div>
          <div class="notif-time">${time}</div>
        </div>`;
    }).join('');
  });
}

window.markNotifRead = async function(notifId) {
  await updateDoc(doc(db, 'notifications', notifId), { read: true }).catch(() => {});
};
window.markAllRead = async function() {
  if (!currentUserUid) return;
  const q = query(
    collection(db, 'notifications'),
    where('to_user_id', '==', currentUserUid),
    where('read', '==', false)
  );
  const snap = await getDocs(q).catch(() => null);
  if (!snap) return;
  snap.docs.forEach(d => updateDoc(d.ref, { read: true }).catch(() => {}));
};

window.toggleNotifPanel = function() {
  document.getElementById('notifPanel').classList.toggle('open');
};

/* ─── Apply-from-Link: read URL params and open modal ─── */
(function checkApplyParam() {
  const params      = new URLSearchParams(window.location.search);
  const applyJob    = params.get('apply');
  const title       = params.get('title')       || 'this job';
  const recruiter   = params.get('recruiter')   || '';
  const firestoreId = params.get('firestore_id')|| '';

  if (!applyJob) return;

  // Store for use when modal submits
  window._pendingApply = {
    jobId:       applyJob,
    jobTitle:    decodeURIComponent(title),
    recruiterId: recruiter,
    firestoreId: firestoreId || applyJob   // fall back to jobId if not provided
  };

  // Populate and open modal — wait for DOM to be ready
  function openModal() {
    const overlay = document.getElementById('applyOverlay');
    if (!overlay) { setTimeout(openModal, 80); return; }

    document.getElementById('applyModalTitle').textContent = decodeURIComponent(title);
    document.getElementById('applyModalSub').textContent   = 'You\'re one step away — submit your application to be considered for this role.';
    overlay.style.display = 'flex';

    // Clean the URL so reloading doesn't re-trigger
    const clean = window.location.pathname;
    window.history.replaceState({}, '', clean);
  }
  openModal();
})();

/* ─── Apply modal helpers ─── */
window.closeApplyModal = function() {
  document.getElementById('applyOverlay').style.display = 'none';
  document.getElementById('applyNoteInput').value = '';
  const msg = document.getElementById('applyStatusMsg');
  msg.style.display = 'none';
  delete window._pendingApply;
};

window.submitApplyModal = async function() {
  // FIX: Prevent simultaneous submissions from rapid double-clicking the button.
  if (window._modalSubmitting) return;
  window._modalSubmitting = true;

  const pending = window._pendingApply;
  if (!pending) { window._modalSubmitting = false; return; }

  const note    = document.getElementById('applyNoteInput').value.trim();
  const btn     = document.getElementById('applySubmitBtn');
  const msgEl   = document.getElementById('applyStatusMsg');

  btn.disabled    = true;
  btn.textContent = '⏳ Submitting…';
  msgEl.style.display = 'none';

  try {
    // apply-job.js exposes window.applyToJob — load it if not present
    if (typeof window.applyToJob !== 'function') {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.type = 'module'; s.src = 'apply-job.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
      // Give the module a moment to register window.applyToJob
      await new Promise(r => setTimeout(r, 200));
    }

    // Check for duplicate before submitting
    if (typeof window.hasApplied === 'function') {
      const alreadyApplied = await window.hasApplied(pending.jobId);
      if (alreadyApplied) {
        msgEl.textContent    = `✋ You've already applied to "${pending.jobTitle}". Check your applications below.`;
        msgEl.style.cssText += ';background:rgba(122,162,255,.07);border:1px solid rgba(122,162,255,.2);color:#7aa2ff;display:block;';
        btn.disabled         = false;
        btn.textContent      = '🚀 Submit Application';
        return;
      }
    }

    // FIX: Pass pending.company as 6th arg so applyToJob stores the correct
    // company_name in Firestore without needing an extra posted_jobs lookup.
    const ok = await window.applyToJob(
      pending.jobId,
      pending.jobTitle,
      pending.recruiterId,
      pending.firestoreId || pending.jobId,
      note,
      pending.company || ""
    );

    if (ok) {
      msgEl.textContent    = '✅ Application submitted! You can track it below.';
      msgEl.style.cssText += ';background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);color:#4ade80;display:block;';
      btn.textContent      = '✓ Applied';
      btn.disabled         = true;
      setTimeout(() => window.closeApplyModal(), 2200);
    } else {
      msgEl.textContent    = `You've already applied to this job, or something went wrong. Please log in and try again.`;
      msgEl.style.cssText += ';background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);color:#f87171;display:block;';
      btn.disabled         = false;
      btn.textContent      = '🚀 Submit Application';
    }
  } finally {
    window._modalSubmitting = false;
  }
};

document.getElementById('pipelineTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.ptab');
  if (!btn) return;
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeStatus = btn.dataset.status;
  renderCards();
});

/* ─── helpers ─── */
function statusColor(s) {
  return { applied:'#7aa2ff', reviewing:'#fbbf24', shortlisted:'#c084fc',
           interview:'#38bdf8', hired:'#4ade80', rejected:'#f87171' }[s] || '#7aa2ff';
}
function statusIcon(s) {
  return { applied:'●', reviewing:'◐', shortlisted:'★', interview:'◆', hired:'✓', rejected:'✕' }[s] || '●';
}
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s || '').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
function timeSince(date) {
  const sec = Math.floor((new Date() - date) / 1000);
  if (sec < 60) return 'just now';
  if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
  if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
  if (sec < 604800) return `${Math.floor(sec/86400)}d ago`;
  return date.toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
}
